const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwc3j1cG2WkZAiPYLW6a4tZtKNW3L-gtQa8bjrZr1b7J22KoRHEQiG7iOeLdxqeQ3Z9nA/exec";
const GOOGLE_CLIENT_ID = "457529892194-utbnqihap22pf00a4t71tq27e6gedp92.apps.googleusercontent.com";

const SESSION_STORAGE_KEY = "ledger_session_token";

const getSessionToken=()=>localStorage.getItem(SESSION_STORAGE_KEY);
const setSessionToken=(t)=>{ if(t) localStorage.setItem(SESSION_STORAGE_KEY,t); else localStorage.removeItem(SESSION_STORAGE_KEY); };

async function cloudGetAll(){
  const token=getSessionToken();
  const res = await fetch(`${APPS_SCRIPT_URL}?t=${Date.now()}&token=${encodeURIComponent(token||"")}`);
  if(!res.ok) throw new Error("cloud fetch failed: "+res.status);
  const data = await res.json();
  if(data.ok===false) throw new Error(data.error||"unauthorized");
  return data;
}
async function cloudPost(payload){
  const token=getSessionToken();
  const res = await fetch(APPS_SCRIPT_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({...payload,token})});
  if(!res.ok) throw new Error("cloud post failed: "+res.status);
  return await res.json();
}
async function cloudSet(key,value){
  const data=await cloudPost({action:"set",key,value});
  if(!data.ok) throw new Error(data.error||"저장 실패");
  return data;
}
const generateFixedTxReq=()=>cloudPost({action:"generateFixedTx"});
const googleLoginReq=(idToken)=>cloudPost({action:"googleLogin",idToken});
const logoutReq=()=>cloudPost({action:"logout"});

const WIDE="min(1560px, 92vw)"; // 각 탭 콘텐츠 컨테이너 폭 — 와이드 모니터에서도 자연스럽게 채워지도록 뷰포트 기준 가변폭

const addYm=(ym,n)=>{const[y,m]=ym.split("-").map(Number);const d=new Date(y,m-1+n,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
const fmtWon=n=>(Number(n)||0).toLocaleString("ko-KR")+"원";
const fmtNum=n=>(Number(n)||0).toLocaleString("ko-KR");
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const moveItem=(arr,idx,dir)=>{const j=idx+dir;if(j<0||j>=arr.length)return arr;const next=[...arr];[next[idx],next[j]]=[next[j],next[idx]];return next;};
function buildMonthWeeks(y,m){
  const first=new Date(y,m,1);
  const start=new Date(first); start.setDate(start.getDate()-start.getDay());
  const last=new Date(y,m+1,0);
  const weeks=[]; let cur=new Date(start);
  do{ const w=[]; for(let i=0;i<7;i++){w.push(new Date(cur));cur.setDate(cur.getDate()+1);} weeks.push(w); }while(cur<=last);
  return weeks;
}

// ══════════════════════════════════════════════════════════════════
// 파생 통계 헬퍼 — tx 배열에서 매번 계산 (누적 카운터 저장 금지)
// ══════════════════════════════════════════════════════════════════

const txInYm=(tx,ym)=>tx.filter(t=>t.ym===ym);
const sumBy=(arr,pred)=>arr.filter(pred).reduce((s,t)=>s+(Number(t.amount)||0),0);

function memberStats(tx,ym,memberId){
  const inYm=txInYm(tx,ym);
  const income=sumBy(inYm,t=>t.type==="income"&&t.memberId===memberId);
  const varExp=sumBy(inYm,t=>t.type==="expense"&&t.kind==="variable"&&t.memberId===memberId);
  const fixExp=sumBy(inYm,t=>t.type==="expense"&&t.kind==="fixed"&&t.memberId===memberId);
  return {income,varExp,fixExp,totalExp:varExp+fixExp,balance:income-(varExp+fixExp)};
}
function householdStats(tx,ym){
  const inYm=txInYm(tx,ym);
  const income=sumBy(inYm,t=>t.type==="income");
  const expense=sumBy(inYm,t=>t.type==="expense");
  return {income,expense,balance:income-expense};
}
// 계좌별 배분 — "어느 계좌에서 실제로 출금됐는지"가 아니라 "어느 계좌 몫으로 귀속되는지"만 계산.
// 변동지출·고정지출을 분리 집계(변동=납부액, 고정=자동 배분액) — 귀속 계좌는 allocAccountId 우선, 없으면 payAccountId.
function accountAlloc(tx,ym,accountId){
  const inYm=txInYm(tx,ym).filter(t=>t.type==="expense");
  const variableAlloc=sumBy(inYm,t=>t.kind==="variable"&&(t.allocAccountId?t.allocAccountId:t.payAccountId)===accountId);
  const fixedAlloc=sumBy(inYm,t=>t.kind==="fixed"&&(t.allocAccountId?t.allocAccountId:t.payAccountId)===accountId);
  return {variableAlloc,fixedAlloc,alloc:variableAlloc+fixedAlloc};
}
function categoryBreakdown(tx,ym,categories){
  const inYm=txInYm(tx,ym).filter(t=>t.type==="expense");
  const byId={};
  inYm.forEach(t=>{byId[t.categoryId]=(byId[t.categoryId]||0)+(Number(t.amount)||0);});
  return categories.map(c=>({...c,amount:byId[c.id]||0})).filter(c=>c.amount>0).sort((a,b)=>b.amount-a.amount);
}
function dailyTotals(tx,dateStr){
  const dayTx=tx.filter(t=>t.date===dateStr);
  return {income:sumBy(dayTx,t=>t.type==="income"),expense:sumBy(dayTx,t=>t.type==="expense")};
}

// ══════════════════════════════════════════════════════════════════

function CategoryDonut({tx,ym,categories}){
  const rows=useMemo(()=>categoryBreakdown(tx,ym,categories),[tx,ym,categories]);
  const total=rows.reduce((s,r)=>s+r.amount,0);
  let top=rows.slice(0,7);
  const restSum=rows.slice(7).reduce((s,r)=>s+r.amount,0);
  if(restSum>0) top=[...top,{id:"__etc",name:"기타",color:MUTED_SLOT,amount:restSum}];
  if(total===0) return <div style={{fontSize:12.5,color:"#cbd5e1",padding:"18px 0",textAlign:"center"}}>이 달 지출 내역이 없습니다</div>;
  let acc=0;
  const stops=top.map(r=>{const from=acc/total*100;acc+=r.amount;const to=acc/total*100;return `${r.color} ${from}% ${to}%`;}).join(", ");
  return(<div style={{display:"flex",gap:20,alignItems:"center",flexWrap:"wrap"}}>
    <div style={{position:"relative",width:132,height:132,flexShrink:0}}>
      <div style={{width:132,height:132,borderRadius:"50%",background:`conic-gradient(${stops})`}}/>
      <div style={{position:"absolute",inset:22,borderRadius:"50%",background:BG.card,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:10.5,color:INK.muted}}>총 지출</span>
        <span style={{fontSize:13,fontWeight:800,color:INK.primary}}>{fmtNum(total)}</span>
      </div>
    </div>
    <div style={{flex:1,minWidth:160,display:"flex",flexDirection:"column",gap:6}}>
      {top.map(r=>(<div key={r.id} style={{display:"flex",alignItems:"center",gap:7,fontSize:12}}>
        <ColorDot color={r.color}/>
        <span style={{flex:1,color:INK.primary,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</span>
        <span style={{color:INK.muted,fontVariantNumeric:"tabular-nums"}}>{Math.round(r.amount/total*100)}%</span>
        <span style={{fontWeight:700,color:INK.primary,fontVariantNumeric:"tabular-nums",minWidth:70,textAlign:"right"}}>{fmtWon(r.amount)}</span>
      </div>))}
    </div>
  </div>);
}

// ══════════════════════════════════════════════════════════════════
// 수입/지출 추이 라인차트 — 최대 24개월, 기간·종료월 선택 가능
// ══════════════════════════════════════════════════════════════════

function TrendChart({tx,endYm,months}){
  const list=useMemo(()=>{const arr=[];for(let i=months-1;i>=0;i--)arr.push(addYm(endYm,-i));return arr;},[endYm,months]);
  const data=list.map(m=>householdStats(tx,m));
  const max=Math.max(1,...data.map(d=>Math.max(d.income,d.expense)));
  const W=Math.max(560,months*38),H=140,PAD=28;
  const x=i=>PAD+i*((W-PAD*2)/Math.max(1,list.length-1));
  const y=v=>H-PAD-(v/max)*(H-PAD*1.6);
  const path=key=>data.map((d,i)=>`${i===0?"M":"L"}${x(i)},${y(d[key])}`).join(" ");
  const labelEvery=months>18?3:(months>12?2:1);
  const lbl=(m,i)=>{const [yy,mm]=m.split("-");return (mm==="01"||i===0)?`${yy.slice(2)}.${mm}`:`${Number(mm)}월`;};
  return(<div style={hScrollSt}>
    <svg width={W} height={H+22} style={{minWidth:W}}>
      {[0,0.5,1].map(f=>(<line key={f} x1={PAD} x2={W-PAD} y1={y(max*f)} y2={y(max*f)} stroke="#e1e0d9" strokeWidth="1"/>))}
      <path d={path("expense")} fill="none" stroke={EXPENSE_COLOR} strokeWidth="2.2"/>
      <path d={path("income")} fill="none" stroke={INCOME_COLOR} strokeWidth="2.2"/>
      {data.map((d,i)=>(<g key={i}>
        <circle cx={x(i)} cy={y(d.expense)} r="4" fill={EXPENSE_COLOR}><title>{list[i]} 지출 {fmtWon(d.expense)}</title></circle>
        <circle cx={x(i)} cy={y(d.income)} r="4" fill={INCOME_COLOR}><title>{list[i]} 수입 {fmtWon(d.income)}</title></circle>
        {(i%labelEvery===0||i===data.length-1)&&<text x={x(i)} y={H} textAnchor="middle" fontSize="10" fill={INK.muted}>{lbl(list[i],i)}</text>}
      </g>))}
    </svg>
    <div style={{display:"flex",gap:14,fontSize:11,color:INK.secondary,marginTop:2}}>
      <span style={{display:"flex",alignItems:"center",gap:5}}><ColorDot color={INCOME_COLOR}/>수입</span>
      <span style={{display:"flex",alignItems:"center",gap:5}}><ColorDot color={EXPENSE_COLOR}/>지출</span>
    </div>
  </div>);
}

// 대시보드 뷰

function DashboardView({data,ym,setYm}){
  const {tx,members,categories,accounts,budgets,config,setConfig}=data;
  const [showCfg,setShowCfg]=useState(false);
  const [trendMonths,setTrendMonths]=useState(12);
  const [trendEndYm,setTrendEndYm]=useState(currentYm());
  const w=config.widgets||DEF_CONFIG.widgets;
  const hh=householdStats(tx,ym);
  const mStats=members.map(m=>({m,s:memberStats(tx,ym,m.id)}));
  const maxExp=Math.max(1,...mStats.map(x=>x.s.totalExp));
  const maxInc=Math.max(1,...mStats.map(x=>x.s.income));
  const fixSum=sumBy(txInYm(tx,ym),t=>t.type==="expense"&&t.kind==="fixed");
  const varSum=sumBy(txInYm(tx,ym),t=>t.type==="expense"&&t.kind==="variable");
  const fvTotal=fixSum+varSum||1;

  // 예산은 구성원별로 등록되므로 카테고리 합계를 자동 계산
  const budgetByCat={};
  budgets.forEach(b=>{ if(!Number(b.limit)) return; budgetByCat[b.categoryId]=(budgetByCat[b.categoryId]||0)+Number(b.limit); });
  const budgetRows=Object.keys(budgetByCat).map(catId=>{
    const cat=categories.find(c=>c.id===catId);
    const spent=sumBy(txInYm(tx,ym),t=>t.type==="expense"&&t.categoryId===catId);
    const limit=budgetByCat[catId];
    const pct=Math.round(spent/limit*100);
    const color=pct>=100?STATUS.critical:pct>=70?STATUS.warning:STATUS.good;
    return {cat,spent,limit,pct,color};
  }).filter(r=>r.cat);

  const WKEYS=[["kpi","수입·지출 요약"],["memberCompare","구성원별 지출 비교"],["memberIncome","구성원별 수입 비교"],["categoryPie","카테고리 도넛차트"],["fixedVsVariable","고정↔변동 비율"],["trend","수입·지출 추이"],["budget","예산 진행률"],["accounts","계좌별 배분 요약"]];

  return(<div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"18px 20px"}}>
    <div style={{maxWidth:WIDE,margin:"0 auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <MonthPicker ym={ym} setYm={setYm}/>
        <div style={{position:"relative"}}>
          <button onClick={()=>setShowCfg(v=>!v)} style={btnFlat}>⚙ 위젯 설정</button>
          {showCfg&&<div style={{position:"absolute",right:0,top:"110%",zIndex:120,background:"#fff",border:`1px solid ${INK.border}`,borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.14)",padding:"12px 14px",width:210}}>
            {WKEYS.map(([k,l])=>(<label key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",fontSize:12.5,color:INK.primary,cursor:"pointer"}}>
              <input type="checkbox" checked={!!w[k]} onChange={()=>setConfig({...config,widgets:{...w,[k]:!w[k]}})} style={{accentColor:PRIMARY}}/>{l}
            </label>))}
          </div>}
        </div>
      </div>

      {w.kpi&&<div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:14}}>
        <StatTile label="총 수입" value={fmtWon(hh.income)} color={INCOME_COLOR}/>
        <StatTile label="총 지출" value={fmtWon(hh.expense)} color={EXPENSE_COLOR}/>
        <StatTile label="잔액" value={fmtWon(hh.balance)} color={hh.balance>=0?STATUS.good:STATUS.critical}/>
      </div>}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:14,marginBottom:14}}>
        {w.memberCompare&&<Card>
          <CardHead title="구성원별 지출 비교" sub="변동+고정 지출 합계 기준"/>
          {mStats.map(({m,s})=>(<div key={m.id} style={{marginBottom:11}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12.5}}>
              <span style={{display:"flex",alignItems:"center",gap:6,fontWeight:600,color:INK.primary}}><ColorDot color={m.color}/>{m.name}</span>
              <span style={{color:INK.muted,fontVariantNumeric:"tabular-nums"}}>{fmtWon(s.totalExp)}</span>
            </div>
            <GaugeBar pct={s.totalExp/maxExp*100} color={m.color}/>
          </div>))}
        </Card>}

        {w.memberIncome&&<Card>
          <CardHead title="구성원별 수입 비교"/>
          {mStats.map(({m,s})=>(<div key={m.id} style={{marginBottom:11}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12.5}}>
              <span style={{display:"flex",alignItems:"center",gap:6,fontWeight:600,color:INK.primary}}><ColorDot color={m.color}/>{m.name}</span>
              <span style={{color:INK.muted,fontVariantNumeric:"tabular-nums"}}>{fmtWon(s.income)}</span>
            </div>
            <GaugeBar pct={s.income/maxInc*100} color={m.color}/>
          </div>))}
        </Card>}

        {w.categoryPie&&<Card>
          <CardHead title="카테고리별 지출" sub="이번 달 상위 항목"/>
          <CategoryDonut tx={tx} ym={ym} categories={categories}/>
        </Card>}

        {w.fixedVsVariable&&<Card>
          <CardHead title="고정 ↔ 변동 지출 비율"/>
          <div style={{display:"flex",height:14,borderRadius:7,overflow:"hidden",marginBottom:8}}>
            <div style={{width:`${fixSum/fvTotal*100}%`,background:CAT_PALETTE[4]}}/>
            <div style={{width:`${varSum/fvTotal*100}%`,background:CAT_PALETTE[2]}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
            <span style={{display:"flex",alignItems:"center",gap:5,color:INK.secondary}}><ColorDot color={CAT_PALETTE[4]}/>고정 {fmtWon(fixSum)}</span>
            <span style={{display:"flex",alignItems:"center",gap:5,color:INK.secondary}}><ColorDot color={CAT_PALETTE[2]}/>변동 {fmtWon(varSum)}</span>
          </div>
        </Card>}

        {w.accounts&&<Card>
          <CardHead title="계좌별 배분 요약" sub="상세 조정은 월배분 탭에서"/>
          {accounts.length===0&&<div style={{fontSize:12.5,color:"#cbd5e1"}}>등록된 계좌가 없습니다 — 설정에서 추가하세요</div>}
          {accounts.map(a=>{const al=accountAlloc(tx,ym,a.id);const owner=members.find(m=>m.id===a.memberId);return(
            <div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid #f1f5f9`,fontSize:12.5}}>
              <span style={{display:"flex",flexDirection:"column",gap:1}}>
                <span style={{display:"flex",alignItems:"center",gap:6,color:INK.primary}}><ColorDot color={a.color||PRIMARY}/>{a.bank} {a.note?`(${a.note})`:""}</span>
                {owner&&<span style={{fontSize:10,color:INK.muted,marginLeft:14}}>{owner.name}</span>}
              </span>
              <span style={{fontWeight:700,color:INK.primary,fontVariantNumeric:"tabular-nums"}}>{fmtWon(al.alloc)}</span>
            </div>);})}
        </Card>}
      </div>

      {w.budget&&budgetRows.length>0&&<Card style={{marginBottom:14}}>
        <CardHead title="예산 진행률" sub="구성원별 한도 합계 기준 · 70% 미만 정상 · 70~100% 주의 · 초과 시 경고"/>
        {budgetRows.map(r=>(<div key={r.cat.id} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:12.5}}>
            <span style={{display:"flex",alignItems:"center",gap:6,color:INK.primary,fontWeight:600}}>
              <ColorDot color={r.cat.color}/>{r.cat.name}
              {r.pct>=100&&<span style={{fontSize:10.5,fontWeight:700,color:STATUS.critical}}>⚠ 예산 초과</span>}
            </span>
            <span style={{color:INK.muted,fontVariantNumeric:"tabular-nums"}}>{fmtNum(r.spent)} / {fmtNum(r.limit)} ({r.pct}%)</span>
          </div>
          <GaugeBar pct={r.pct} color={r.color}/>
        </div>))}
      </Card>}

      {w.trend&&<Card>
        <CardHead title="수입·지출 추이" right={
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            {[6,12,24].map(n=>(<button key={n} onClick={()=>setTrendMonths(n)} style={trendMonths===n?btnTint:btnFlat}>{n}개월</button>))}
            <input type="month" value={trendEndYm} max={currentYm()} onChange={e=>setTrendEndYm(e.target.value||currentYm())} style={{...inputSt,width:132}}/>
          </div>}/>
        <TrendChart tx={tx} endYm={trendEndYm} months={trendMonths}/>
      </Card>}
    </div>
  </div>);
}

// 캘린더 뷰 — 내역과 연동, 날짜별 수입·지출 합계 표시

function CalendarView({data}){
  const {tx,members,categories}=data;
  const now=new Date();
  const [ref,setRef]=useState({y:now.getFullYear(),m:now.getMonth()});
  const [selDay,setSelDay]=useState(null);
  const weeks=useMemo(()=>buildMonthWeeks(ref.y,ref.m),[ref]);
  const today_=todayStr();
  const wd=["일","월","화","수","목","금","토"];
  const move=n=>{const d=new Date(ref.y,ref.m+n,1);setRef({y:d.getFullYear(),m:d.getMonth()});setSelDay(null);};

  return(<div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"18px 20px"}}>
    <div style={{maxWidth:WIDE,margin:"0 auto"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={()=>move(-1)} style={btnGhost}>◀</button>
        <span style={{fontWeight:800,fontSize:16,color:INK.primary,minWidth:110,textAlign:"center"}}>{ref.y}년 {ref.m+1}월</span>
        <button onClick={()=>move(1)} style={btnGhost}>▶</button>
        {(ref.y!==now.getFullYear()||ref.m!==now.getMonth())&&<button onClick={()=>{setRef({y:now.getFullYear(),m:now.getMonth()});setSelDay(null);}} style={btnTint}>이번 달</button>}
      </div>
      <Card>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:`1px solid ${INK.border}`,marginBottom:4,paddingBottom:4}}>
          {wd.map((wname,i)=><div key={wname} style={{padding:"4px 0",textAlign:"center",fontSize:11.5,fontWeight:700,color:i===0?EXPENSE_COLOR:i===6?PRIMARY:INK.muted}}>{wname}</div>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {weeks.flat().map((d,i)=>{
            const inM=d.getMonth()===ref.m; const ds=fmtDate(d); const isToday=ds===today_;
            const {income,expense}=dailyTotals(tx,ds);
            const has=income>0||expense>0;
            return(<div key={i} onClick={()=>inM&&setSelDay(ds)}
              style={{minHeight:64,padding:"5px 4px",borderRadius:8,cursor:inM?"pointer":"default",
                background:isToday?BG.tint:"#fff",border:`1px solid ${isToday?BG.tintBorder:"#f1f5f9"}`,opacity:inM?1:0.35}}>
              <div style={{fontSize:11,fontWeight:isToday?800:600,color:isToday?PRIMARY:INK.secondary,marginBottom:3}}>{d.getDate()}</div>
              {has&&<div style={{display:"flex",flexDirection:"column",gap:1}}>
                {income>0&&<div style={{fontSize:9.5,fontWeight:700,color:INCOME_COLOR}}>+{fmtNum(income)}</div>}
                {expense>0&&<div style={{fontSize:9.5,fontWeight:700,color:EXPENSE_COLOR}}>-{fmtNum(expense)}</div>}
              </div>}
            </div>);
          })}
        </div>
        <div style={{fontSize:10.5,color:INK.muted,marginTop:10}}>· 각 날짜 칸은 그날 하루의 수입·지출 합계입니다. 날짜를 클릭하면 그날의 거래 목록을 볼 수 있습니다.</div>
      </Card>
      {selDay&&<CalendarDayPanel ds={selDay} tx={tx.filter(t=>t.date===selDay)} members={members} categories={categories} onClose={()=>setSelDay(null)}/>}
    </div>
  </div>);
}

function CalendarDayPanel({ds,tx,members,categories,onClose}){
  const income=sumBy(tx,t=>t.type==="income");
  const expense=sumBy(tx,t=>t.type==="expense");
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={onClose}>
    <div style={{background:"#fff",borderRadius:14,padding:20,width:440,maxWidth:"90vw",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 8px 32px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontWeight:800,fontSize:14,color:INK.primary}}>📅 {ds}</span>
        <span onClick={onClose} style={{cursor:"pointer",color:INK.muted}}>✕</span>
      </div>
      <div style={{display:"flex",gap:14,marginBottom:12,fontSize:12.5}}>
        <span style={{color:INCOME_COLOR,fontWeight:700}}>수입 {fmtWon(income)}</span>
        <span style={{color:EXPENSE_COLOR,fontWeight:700}}>지출 {fmtWon(expense)}</span>
      </div>
      {tx.length===0&&<div style={{fontSize:12.5,color:"#cbd5e1"}}>이 날짜의 거래가 없습니다</div>}
      {tx.map(t=>{const mem=members.find(m=>m.id===t.memberId);const cat=categories.find(c=>c.id===t.categoryId);
        return(<div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 2px",borderBottom:"1px solid #f1f5f9",fontSize:12.5}}>
          {mem&&<ColorDot color={mem.color}/>}<span style={{color:INK.secondary,width:56,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{mem?.name||"-"}</span>

    </div>
  </div>);
}

// 내역(입력·목록) 뷰
// ══════════════════════════════════════════════════════════════════

function emptyTxForm(){return {type:"expense",ym:currentYm(),date:todayStr(),memberId:"",categoryId:"",desc:"",amount:"",payAccountId:"",allocAccountId:"",memo:""};}

function TxView({data,ym,setYm}){
  const {tx,setTx,members,categories,accounts}=data;
  const [form,setForm]=useState(emptyTxForm());
  const [editId,setEditId]=useState(null);
  const [fMember,setFMember]=useState("전체");
  const [fCat,setFCat]=useState("전체");
  const [fType,setFType]=useState("전체");

  useEffect(()=>{setForm(f=>({...f,ym}));},[ym]);

  const rows=useMemo(()=>tx.filter(t=>t.ym===ym)
    .filter(t=>fMember==="전체"||t.memberId===fMember)
    .filter(t=>fCat==="전체"||t.categoryId===fCat)
    .filter(t=>fType==="전체"||(fType==="수입"?t.type==="income":fType==="변동"?t.kind==="variable":fType==="고정"?t.kind==="fixed":true))
    .sort((a,b)=>b.date.localeCompare(a.date)),[tx,ym,fMember,fCat,fType]);

  const sumIncome=sumBy(rows,t=>t.type==="income");
  const sumExpense=sumBy(rows,t=>t.type==="expense");
  const diff=sumIncome-sumExpense;

  const submit=()=>{
    if(!form.memberId||!form.desc.trim()||!Number(form.amount)) return;
    const rec={...form,ym:form.date.slice(0,7),amount:Number(form.amount),
      categoryId:form.type==="income"?"":form.categoryId,
      kind:form.type==="income"?undefined:(form.kind||"variable"), // 수정 시 기존 kind(변동/고정) 보존 — 신규 입력만 변동으로 기본값
      id:editId||("tx_"+uid()),createdAt:editId?tx.find(t=>t.id===editId)?.createdAt:nowIso()};
    if(editId){ setTx(tx.map(t=>t.id===editId?rec:t)); } else { setTx([...tx,rec]); }
    setForm(emptyTxForm()); setEditId(null);
  };
  const cancelEdit=()=>{setForm(emptyTxForm());setEditId(null);};
  const startEdit=t=>{setForm({...t});setEditId(t.id);};
  const del=id=>{if(!confirm("삭제하시겠습니까?"))return;setTx(tx.filter(t=>t.id!==id));if(editId===id){cancelEdit();}};

  return(<div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"18px 20px"}}>
    <div style={{maxWidth:WIDE,margin:"0 auto"}}>
      <div style={{marginBottom:14}}><MonthPicker ym={ym} setYm={setYm}/></div>

      <Card style={{marginBottom:14}}>
        <CardHead title={editId?"거래 수정":"거래 추가"} sub="지출은 기본적으로 변동지출로 기록됩니다 (고정지출은 설정 탭에서 템플릿으로 관리)"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8}}>
          <Field label="구분">
            <select style={inputSt} value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
              <option value="expense">지출</option><option value="income">수입</option>
            </select>
          </Field>
          <Field label="일자">
            <input type="date" style={inputSt} value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/>
          </Field>
          <Field label="구성원">
            <select style={inputSt} value={form.memberId} onChange={e=>setForm({...form,memberId:e.target.value})}>
              <option value="">구성원 선택</option>{members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
          </Field>
          <Field label="카테고리">
            <select style={{...inputSt,opacity:form.type==="income"?0.45:1}} disabled={form.type==="income"} value={form.categoryId} onChange={e=>setForm({...form,categoryId:e.target.value})}>
              <option value="">카테고리 선택</option>{categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </Field>

      <Card>
        <div style={hScrollSt}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5,minWidth:760}}>
          <thead><tr style={{color:INK.muted,fontSize:11,textAlign:"left"}}>
            <th style={{padding:"4px 6px"}}>날짜</th><th style={{padding:"4px 6px"}}>구분</th><th style={{padding:"4px 6px"}}>구성원</th>
            <th style={{padding:"4px 6px"}}>카테고리</th><th style={{padding:"4px 6px"}}>내용</th>
            <th style={{padding:"4px 6px",textAlign:"right"}}>수입</th><th style={{padding:"4px 6px",textAlign:"right"}}>지출</th>
            <th style={{padding:"4px 6px"}}>방법</th><th style={{padding:"4px 6px"}}>비고</th><th></th>
          </tr></thead>
          <tbody>
            {rows.length===0&&<tr><td colSpan={10} style={{padding:"14px 6px",color:"#cbd5e1"}}>내역이 없습니다</td></tr>}
            {rows.map(t=>{const cat=categories.find(c=>c.id===t.categoryId);const mem=members.find(m=>m.id===t.memberId);const acc=accounts.find(a=>a.id===t.payAccountId);
              return(<tr key={t.id} style={{borderTop:"1px solid #f1f5f9"}}>
                <td style={{padding:"7px 6px",color:INK.muted,fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{t.date}</td>

                    background:t.type==="income"?INCOME_COLOR+"1c":t.kind==="fixed"?CAT_PALETTE[4]+"1c":EXPENSE_COLOR+"1c",
                    color:t.type==="income"?INCOME_COLOR:t.kind==="fixed"?CAT_PALETTE[4]:EXPENSE_COLOR}}>{t.type==="income"?"수입":t.kind==="fixed"?"고정":"변동"}</span>

                <td style={{padding:"7px 6px",color:INK.primary,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.desc}</td>

                <td style={{padding:"7px 6px",textAlign:"right",color:EXPENSE_COLOR,fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{t.type==="expense"?fmtWon(t.amount):""}</td>

                <td style={{padding:"7px 6px",color:INK.secondary,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.memo||""}</td>

// 월배분 뷰 — 핵심 기능
// 계좌별 배분: "어느 계좌에서 실제로 출금됐는지"가 아니라 "어느 계좌 몫으로 귀속되는지"만 계산한다.
// 납부액=변동지출 귀속액, 자동 배분액=고정지출 귀속액
// ══════════════════════════════════════════════════════════════════

function AllocView({data,ym,setYm}){
  const {tx,members,accounts,allocAdjust,setAllocAdjust}=data;
  const hh=householdStats(tx,ym);
  const mRows=members.map(m=>({m,s:memberStats(tx,ym,m.id)}));
  const totalExp=sumBy(txInYm(tx,ym),t=>t.type==="expense");
  const monthAdj=allocAdjust[ym]||{};

  // 조정 항목은 {amount, note} 형태 — 금액을 비워도 사유(note)만 남겨둘 수 있도록 항상 객체로 유지
  const setAdjAmount=(accountId,val)=>{
    const cur=monthAdj[accountId]||{};
    const amount=(val===""||val===null||val===undefined)?undefined:Number(val);
    const next={...allocAdjust,[ym]:{...monthAdj,[accountId]:{...cur,amount}}};
    setAllocAdjust(next);
  };
  const setAdjNote=(accountId,note)=>{
    const cur=monthAdj[accountId]||{};
    const next={...allocAdjust,[ym]:{...monthAdj,[accountId]:{...cur,note}}};
    setAllocAdjust(next);
  };

  let totalAllocEffective=0;
  const accRows=accounts.map(a=>{
    const al=accountAlloc(tx,ym,a.id);
    const base=al.variableAlloc+al.fixedAlloc;
    const adjEntry=monthAdj[a.id]||{};
    const adjAmount=adjEntry.amount;
    const effective=(adjAmount===undefined||adjAmount===null)?base:adjAmount;
    totalAllocEffective+=effective;
    const owner=members.find(m=>m.id===a.memberId);
    return {a,owner,...al,base,adjAmount,note:adjEntry.note||"",effective};
  });
  const diff=totalExp-totalAllocEffective;

  return(<div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"18px 20px"}}>
    <div style={{maxWidth:WIDE,margin:"0 auto"}}>
      <div style={{marginBottom:14}}><MonthPicker ym={ym} setYm={setYm}/></div>

      <Card style={{marginBottom:14}}>
        <CardHead title="월 지출 결산" sub="구성원별 수입·변동지출·고정지출·잔액"/>
        <div style={hScrollSt}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5,minWidth:520}}>
          <thead><tr style={{textAlign:"right",color:INK.muted,fontSize:11}}>
            <th style={{textAlign:"left",padding:"4px 6px"}}>구성원</th>
            <th style={{padding:"4px 6px"}}>수입</th><th style={{padding:"4px 6px"}}>변동지출</th>
            <th style={{padding:"4px 6px"}}>고정지출</th><th style={{padding:"4px 6px"}}>지출합계</th><th style={{padding:"4px 6px"}}>잔액</th>
          </tr></thead>
          <tbody>
            {mRows.map(({m,s})=>(<tr key={m.id} style={{borderTop:`1px solid #f1f5f9`}}>
              <td style={{padding:"7px 6px",display:"flex",alignItems:"center",gap:6,fontWeight:600,color:INK.primary}}><ColorDot color={m.color}/>{m.name}</td>
              <td style={{padding:"7px 6px",textAlign:"right",color:INCOME_COLOR,fontVariantNumeric:"tabular-nums"}}>{fmtNum(s.income)}</td>
              <td style={{padding:"7px 6px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmtNum(s.varExp)}</td>
              <td style={{padding:"7px 6px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmtNum(s.fixExp)}</td>
              <td style={{padding:"7px 6px",textAlign:"right",fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmtNum(s.totalExp)}</td>
              <td style={{padding:"7px 6px",textAlign:"right",fontWeight:700,color:s.balance>=0?STATUS.good:STATUS.critical,fontVariantNumeric:"tabular-nums"}}>{fmtNum(s.balance)}</td>
            </tr>))}
            <tr style={{borderTop:`2px solid ${INK.border}`,fontWeight:800}}>
              <td style={{padding:"7px 6px",color:INK.primary}}>합계</td>
              <td style={{padding:"7px 6px",textAlign:"right",color:INCOME_COLOR}}>{fmtNum(hh.income)}</td>
              <td colSpan={2}></td>
              <td style={{padding:"7px 6px",textAlign:"right"}}>{fmtNum(hh.expense)}</td>
              <td style={{padding:"7px 6px",textAlign:"right",color:hh.balance>=0?STATUS.good:STATUS.critical}}>{fmtNum(hh.balance)}</td>
            </tr>
          </tbody>
        </table>
        </div>
      </Card>

      <Card>
        <CardHead title="계좌별 배분 금액" sub="납부액=변동지출 귀속액 · 자동 배분액=고정지출 귀속액 (실제 출금 계좌가 아니라 귀속 계좌 기준으로 계산됩니다)"/>
        {accounts.length===0&&<div style={{fontSize:12.5,color:"#cbd5e1"}}>등록된 계좌가 없습니다 — 설정에서 추가하세요</div>}
        {accounts.length>0&&<div style={hScrollSt}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5,minWidth:680}}>
          <thead><tr style={{textAlign:"right",color:INK.muted,fontSize:11}}>
            <th style={{textAlign:"left",padding:"4px 6px"}}>계좌</th>
            <th style={{padding:"4px 6px"}}>납부액</th><th style={{padding:"4px 6px"}}>자동 배분액</th>
            <th style={{padding:"4px 6px"}}>조정값</th><th style={{padding:"4px 6px",textAlign:"left"}}>비고</th><th style={{padding:"4px 6px"}}>최종 배분액</th>
          </tr></thead>
          <tbody>
            {accRows.map(r=>(<tr key={r.a.id} style={{borderTop:"1px solid #f1f5f9"}}>
              <td style={{padding:"7px 6px",color:INK.primary}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}><ColorDot color={r.a.color||PRIMARY}/>{r.a.bank}{r.a.note?` (${r.a.note})`:""}</div>
                {r.owner&&<div style={{fontSize:10,color:INK.muted,marginLeft:14}}>{r.owner.name}</div>}
              </td>
              <td style={{padding:"7px 6px",textAlign:"right",fontVariantNumeric:"tabular-nums"}}>{fmtNum(r.variableAlloc)}</td>
              <td style={{padding:"7px 6px",textAlign:"right",fontVariantNumeric:"tabular-nums",color:INK.muted}}>{fmtNum(r.fixedAlloc)}</td>
              <td style={{padding:"5px 6px",width:130}}>
                <MoneyInput value={r.adjAmount===undefined||r.adjAmount===null?"":r.adjAmount} onChange={v=>setAdjAmount(r.a.id,v)}/>
              </td>
              <td style={{padding:"5px 6px",width:150}}>
                <input style={inputSt} placeholder="조정 사유" value={r.note} onChange={e=>setAdjNote(r.a.id,e.target.value)}/>
              </td>
              <td style={{padding:"7px 6px",textAlign:"right",fontWeight:800,color:INK.primary,fontVariantNumeric:"tabular-nums"}}>
                {fmtNum(r.effective)}{r.adjAmount!==undefined&&r.adjAmount!==null&&<span style={{fontSize:10,fontWeight:600,color:PRIMARY,marginLeft:4}}>(조정됨)</span>}
              </td>
            </tr>))}
          </tbody>
        </table>
        </div>}
        <div style={{marginTop:12,padding:"10px 12px",borderRadius:10,background:Math.abs(diff)<1?"#f0fdf4":"#fef2f2",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,fontSize:12.5}}>
          <span style={{color:INK.secondary}}>검산 — 총지출 {fmtWon(totalExp)} vs 배분합계 {fmtWon(totalAllocEffective)}</span>
          <span style={{fontWeight:800,color:Math.abs(diff)<1?STATUS.good:STATUS.critical}}>{Math.abs(diff)<1?"일치 ✓":`차이 ${fmtWon(diff)}`}</span>
        </div>
      </Card>
    </div>
  </div>);
}

// 설정 뷰 — 구성원·계좌·카테고리·예산·고정지출 템플릿·엑셀 내보내기
// ══════════════════════════════════════════════════════════════════

function SettingsView({data}){
  const {members,setMembers,accounts,setAccounts,categories,setCategories,budgets,setBudgets,fixedTemplates,setFixedTemplates,toast,refreshTxAndFixed,tx}=data;
  const [section,setSection]=useState("members");
  const [expSel,setExpSel]=useState({tx:true,fixed:true,categories:false,accounts:false,budgets:false});
  const SECS=[["members","구성원"],["accounts","계좌"],["categories","카테고리"],["budgets","예산"],["fixed","고정지출 템플릿"],["export","엑셀 내보내기"]];

  const addMember=()=>setMembers([...members,{id:"m_"+uid(),name:"새 구성원",color:CAT_PALETTE[members.length%8]}]);
  const addAccount=()=>setAccounts([...accounts,{id:"a_"+uid(),memberId:members[0]?.id||"",bank:"",note:"",color:CAT_PALETTE[accounts.length%8]}]);
  const addCategory=()=>setCategories([...categories,{id:"c_"+uid(),name:"새 카테고리",desc:"",color:CAT_PALETTE_EXT[categories.length%10],preset:false}]);
  const addFixed=()=>setFixedTemplates([...fixedTemplates,{id:"f_"+uid(),name:"",categoryId:categories[0]?.id||"",memberId:members[0]?.id||"",payAccountId:"",allocAccountId:"",dueDay:15,amount:"",startYm:currentYm(),endYm:"",lastGeneratedYm:"",memo:""}]);
  const updFixed=(id,patch)=>setFixedTemplates(fixedTemplates.map(x=>x.id===id?{...x,...patch}:x));

  const runGenerate=async()=>{
    try{
      const r=await generateFixedTxReq();
      await refreshTxAndFixed(); // 백엔드가 반영한 최신 거래·템플릿을 즉시 재조회(30초 폴링을 기다리지 않고 바로 내역·월배분·대시보드에 반영)
      toast(`고정지출 생성 완료 — 신규 ${r.created}건`);
    }catch(e){ toast("생성 실패: "+e.message); }
  };

  const styleHeader=(ws,head)=>{head.forEach((_,i)=>{const cell=ws[XLSX.utils.encode_cell({r:0,c:i})];if(cell)cell.s={font:{bold:true,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"2A78D6"}}};});ws["!cols"]=head.map(()=>({wch:14}));};
  const runExport=()=>{
    const wb=XLSX.utils.book_new();
    if(expSel.tx){
      const head=["날짜","구분","구성원","카테고리","내용","수입","지출","계좌","메모"];
      const aoa=[head,...tx.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(t=>[t.date,t.type==="income"?"수입":(t.kind==="fixed"?"고정지출":"변동지출"),
        members.find(m=>m.id===t.memberId)?.name||"",categories.find(c=>c.id===t.categoryId)?.name||"",t.desc||"",
        t.type==="income"?t.amount:"",t.type==="expense"?t.amount:"",accounts.find(a=>a.id===t.payAccountId)?.bank||"",t.memo||""])];
      const ws=XLSX.utils.aoa_to_sheet(aoa); styleHeader(ws,head);
      XLSX.utils.book_append_sheet(wb,ws,"거래내역");
    }
    if(expSel.fixed){
      const head=["이름","카테고리","구성원","납부계좌","배분계좌","납부일","금액","적용기간","비고"];
      const aoa=[head,...fixedTemplates.map(f=>[f.name,categories.find(c=>c.id===f.categoryId)?.name||"",members.find(m=>m.id===f.memberId)?.name||"",
        accounts.find(a=>a.id===f.payAccountId)?.bank||"",accounts.find(a=>a.id===f.allocAccountId)?.bank||"",f.dueDay,f.amount,`${f.startYm||""} ~ ${f.endYm||"계속"}`,f.memo||""])];
      const ws=XLSX.utils.aoa_to_sheet(aoa); styleHeader(ws,head);
      XLSX.utils.book_append_sheet(wb,ws,"고정지출템플릿");
    }
    if(expSel.categories){
      const head=["이름","설명"];
      const aoa=[head,...categories.map(c=>[c.name,c.desc||""])];
      const ws=XLSX.utils.aoa_to_sheet(aoa); styleHeader(ws,head);
      XLSX.utils.book_append_sheet(wb,ws,"카테고리");
    }
    if(expSel.accounts){
      const head=["구성원","은행","비고"];
      const aoa=[head,...accounts.map(a=>[members.find(m=>m.id===a.memberId)?.name||"",a.bank,a.note||""])];
      const ws=XLSX.utils.aoa_to_sheet(aoa); styleHeader(ws,head);
      XLSX.utils.book_append_sheet(wb,ws,"계좌");
    }
    if(expSel.budgets){
      const head=["카테고리","구성원","한도"];
      const aoa=[head,...budgets.filter(b=>Number(b.limit)>0).map(b=>[categories.find(c=>c.id===b.categoryId)?.name||"",members.find(m=>m.id===b.memberId)?.name||"",b.limit])];
      const ws=XLSX.utils.aoa_to_sheet(aoa); styleHeader(ws,head);
      XLSX.utils.book_append_sheet(wb,ws,"예산");
    }
    if(wb.SheetNames.length===0){ toast("내보낼 시트를 하나 이상 선택하세요"); return; }
    XLSX.writeFile(wb,`가계부_전체_${todayStr()}.xlsx`);
  };

  return(<div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"18px 20px"}}>
    <div style={{maxWidth:WIDE,margin:"0 auto"}}>
      <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        {SECS.map(([k,l])=>(<button key={k} onClick={()=>setSection(k)}
          style={{padding:"7px 13px",borderRadius:9,border:`1px solid ${section===k?BG.tintBorder:INK.border}`,
            background:section===k?BG.tint:"#fff",color:section===k?PRIMARY:INK.secondary,fontSize:12.5,fontWeight:700,cursor:"pointer"}}>{l}</button>))}
      </div>

      {section==="members"&&<Card>
        <CardHead title="구성원" sub="가계부를 함께 쓰는 구성원 — 지출자·수입 기준" right={<button onClick={addMember} style={btnFlat}>＋ 추가</button>}/>
        {members.map((m,i)=>(<div key={m.id} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
          <input type="color" value={m.color} onChange={e=>setMembers(members.map(x=>x.id===m.id?{...x,color:e.target.value}:x))} style={{width:32,height:32,border:"none",borderRadius:8,cursor:"pointer"}}/>
          <input style={{...inputSt,flex:1}} value={m.name} onChange={e=>setMembers(members.map(x=>x.id===m.id?{...x,name:e.target.value}:x))}/>
          <span onClick={()=>setMembers(members.filter(x=>x.id!==m.id))} style={{cursor:"pointer",color:"#cbd5e1"}}>✕</span>
        </div>))}
      </Card>}

      {section==="accounts"&&<Card>
        <CardHead title="계좌" sub="구성원별 은행·계좌 — 지출 입력 시 결제계좌·고정지출 배분계좌로 사용. ▲▼로 표시 순서 변경" right={<button onClick={addAccount} style={btnFlat}>＋ 추가</button>}/>
        {accounts.map((a,idx)=>(<div key={a.id} style={{display:"grid",gridTemplateColumns:"auto 32px 100px 1fr 1fr auto",gap:8,alignItems:"center",marginBottom:8}}>
          <ReorderBtns onUp={()=>setAccounts(moveItem(accounts,idx,-1))} onDown={()=>setAccounts(moveItem(accounts,idx,1))} disabledUp={idx===0} disabledDown={idx===accounts.length-1}/>
          <input type="color" value={a.color||PRIMARY} onChange={e=>setAccounts(accounts.map(x=>x.id===a.id?{...x,color:e.target.value}:x))} style={{width:32,height:32,border:"none",borderRadius:8,cursor:"pointer"}}/>
          <select style={inputSt} value={a.memberId} onChange={e=>setAccounts(accounts.map(x=>x.id===a.id?{...x,memberId:e.target.value}:x))}>
            {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
          <input style={inputSt} placeholder="은행/카드사" value={a.bank} onChange={e=>setAccounts(accounts.map(x=>x.id===a.id?{...x,bank:e.target.value}:x))}/>
          <input style={inputSt} placeholder="비고(용도)" value={a.note} onChange={e=>setAccounts(accounts.map(x=>x.id===a.id?{...x,note:e.target.value}:x))}/>
          <span onClick={()=>setAccounts(accounts.filter(x=>x.id!==a.id))} style={{cursor:"pointer",color:"#cbd5e1"}}>✕</span>
        </div>))}
      </Card>}

      {section==="categories"&&<Card>
        <CardHead title="카테고리" sub="지출 분류 — 프리셋 10종 + 커스텀 추가 가능" right={<button onClick={addCategory} style={btnFlat}>＋ 추가</button>}/>
        {categories.map(c=>(<div key={c.id} style={{display:"grid",gridTemplateColumns:"32px 120px 1fr auto",gap:8,alignItems:"center",marginBottom:8}}>
          <input type="color" value={c.color} onChange={e=>setCategories(categories.map(x=>x.id===c.id?{...x,color:e.target.value}:x))} style={{width:32,height:32,border:"none",borderRadius:8,cursor:"pointer"}}/>
          <input style={inputSt} value={c.name} onChange={e=>setCategories(categories.map(x=>x.id===c.id?{...x,name:e.target.value}:x))}/>
          <input style={inputSt} placeholder="설명" value={c.desc} onChange={e=>setCategories(categories.map(x=>x.id===c.id?{...x,desc:e.target.value}:x))}/>
          <span onClick={()=>setCategories(categories.filter(x=>x.id!==c.id))} style={{cursor:"pointer",color:"#cbd5e1"}}>✕</span>
        </div>))}
      </Card>}

      {section==="budgets"&&<Card>
        <CardHead title="카테고리별 월 예산" sub="구성원별로 한도를 지정하면 카테고리 합계가 자동 계산됩니다 (대시보드 예산 진행률에 사용)"/>
        {categories.map(c=>{
          const catBudgets=members.map(m=>budgets.find(b=>b.categoryId===c.id&&b.memberId===m.id)||{categoryId:c.id,memberId:m.id,limit:""});
          const total=catBudgets.reduce((s,b)=>s+(Number(b.limit)||0),0);
          const updBudget=(memberId,v)=>{
            const exists=budgets.some(b=>b.categoryId===c.id&&b.memberId===memberId);
            setBudgets(exists?budgets.map(b=>(b.categoryId===c.id&&b.memberId===memberId)?{...b,limit:v}:b):[...budgets,{categoryId:c.id,memberId,limit:v}]);
          };
          return(<div key={c.id} style={{borderBottom:"1px solid #f1f5f9",padding:"10px 0"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,fontSize:12.5,fontWeight:700,color:INK.primary}}>
              <ColorDot color={c.color}/>{c.name}
              <span style={{marginLeft:"auto",fontSize:12,fontWeight:800,color:PRIMARY}}>합계 {fmtWon(total)}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:`repeat(auto-fit,minmax(140px,1fr))`,gap:8}}>
              {members.map((m,i)=>(<Field key={m.id} label={m.name}>
                <MoneyInput value={catBudgets[i].limit} onChange={v=>updBudget(m.id,v)}/>
              </Field>))}
            </div>
          </div>);
        })}
      </Card>}

      {section==="fixed"&&<Card>
        <CardHead title="고정지출 템플릿" sub="매달 납부일이 되면 자동으로 거래내역에 생성됩니다. 납부계좌=결제(출금) 계좌 · 배분계좌=비용이 귀속되는 계좌(월배분 탭 집계 기준). ▲▼로 순서 변경, 좌측 색상 띠는 구성원 색상"
          right={<div style={{display:"flex",gap:6}}><button onClick={runGenerate} style={btnFlat}>지금 생성 실행</button><button onClick={addFixed} style={btnFlat}>＋ 추가</button></div>}/>
        {fixedTemplates.map((f,idx)=>{const owner=members.find(m=>m.id===f.memberId);
          return(<div key={f.id} style={{display:"flex",gap:8,marginBottom:8}}>
            <ReorderBtns onUp={()=>setFixedTemplates(moveItem(fixedTemplates,idx,-1))} onDown={()=>setFixedTemplates(moveItem(fixedTemplates,idx,1))} disabledUp={idx===0} disabledDown={idx===fixedTemplates.length-1}/>
            <div style={{flex:1,border:`1px solid ${INK.border}`,borderLeft:`4px solid ${owner?.color||INK.border}`,borderRadius:10,padding:10}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginBottom:8}}>
                <Field label="이름"><input style={inputSt} placeholder="예: 보험료" value={f.name} onChange={e=>updFixed(f.id,{name:e.target.value})}/></Field>
                <Field label="카테고리"><select style={inputSt} value={f.categoryId} onChange={e=>updFixed(f.id,{categoryId:e.target.value})}>
                  {categories.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select></Field>
                <Field label="구성원"><select style={inputSt} value={f.memberId} onChange={e=>updFixed(f.id,{memberId:e.target.value})}>
                  {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
                </select></Field>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,alignItems:"end"}}>
                <Field label="납부계좌(출금)"><select style={inputSt} value={f.payAccountId} onChange={e=>updFixed(f.id,{payAccountId:e.target.value})}>
                  <option value="">선택 안 함</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.bank} {a.note}</option>)}
                </select></Field>
                <Field label="배분계좌(귀속)"><select style={inputSt} value={f.allocAccountId} onChange={e=>updFixed(f.id,{allocAccountId:e.target.value})}>
                  <option value="">선택 안 함</option>{accounts.map(a=><option key={a.id} value={a.id}>{a.bank} {a.note}</option>)}
                </select></Field>
                <Field label="납부일(매달)"><DayOfMonthPicker value={f.dueDay} onChange={d=>updFixed(f.id,{dueDay:d})}/></Field>
                <Field label="금액(원)"><MoneyInput value={f.amount} onChange={v=>updFixed(f.id,{amount:v})}/></Field>
                <span onClick={()=>setFixedTemplates(fixedTemplates.filter(x=>x.id!==f.id))} style={{cursor:"pointer",color:"#cbd5e1",alignSelf:"center",justifySelf:"end"}}>✕ 삭제</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:8,marginTop:8}}>
                <Field label="적용 시작월"><input type="month" style={inputSt} value={f.startYm||""} onChange={e=>updFixed(f.id,{startYm:e.target.value})}/></Field>
                <Field label="적용 종료월(비우면 계속)"><input type="month" style={inputSt} value={f.endYm||""} onChange={e=>updFixed(f.id,{endYm:e.target.value})}/></Field>
                <Field label="비고"><input style={inputSt} placeholder="예: 25.12월부터 만기삭제" value={f.memo||""} onChange={e=>updFixed(f.id,{memo:e.target.value})}/></Field>
              </div>
            </div>
          </div>);})}
      </Card>}

      {section==="export"&&<Card>
        <CardHead title="엑셀 내보내기" sub="체크한 항목을 시트별로 담아 하나의 엑셀 파일로 내보냅니다"/>
        {[["tx","거래내역"],["fixed","고정지출 템플릿"],["categories","카테고리"],["accounts","계좌"],["budgets","예산"]].map(([k,l])=>(
          <label key={k} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",fontSize:12.5,color:INK.primary,cursor:"pointer"}}>
            <input type="checkbox" checked={!!expSel[k]} onChange={()=>setExpSel({...expSel,[k]:!expSel[k]})} style={{accentColor:PRIMARY}}/>{l}
          </label>
        ))}
        <button onClick={runExport} style={{...btnPrimary,marginTop:10}}>⇩ 선택 항목 내보내기</button>
      </Card>}
    </div>
  </div>);
}

// 로그인 화면 — 등록된 Google 계정만 통과(허용목록은 Apps Script ALLOWED_EMAILS에서 관리)
// ══════════════════════════════════════════════════════════════════

const LOGIN_ERR_MSG={
  not_allowed:"등록되지 않은 계정입니다 — 관리자에게 계정 등록을 요청하세요",
  invalid_token:"로그인 확인에 실패했습니다 — 다시 시도해주세요",
  client_mismatch:"앱 설정 오류(클라이언트 ID 불일치) — 관리자에게 문의하세요",
  email_not_verified:"이메일이 확인되지 않은 계정입니다",
  missing_token:"로그인 정보를 받지 못했습니다 — 다시 시도해주세요",
};

function LoginScreen({onLoggedIn}){
  const btnRef=useRef(null);
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);

  useEffect(()=>{
    let cancelled=false;
    const tryInit=()=>{
      if(cancelled) return;
      if(!window.google||!window.google.accounts||!window.google.accounts.id){ setTimeout(tryInit,200); return; }
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: async (resp)=>{
          setBusy(true); setErr("");
          try{
            const r=await googleLoginReq(resp.credential);
            if(!r.ok) throw new Error(LOGIN_ERR_MSG[r.error]||r.error||"로그인 실패");
            setSessionToken(r.token);
            onLoggedIn();
          }catch(e){ setErr(e.message); }
          setBusy(false);
        }
      });
      if(btnRef.current) window.google.accounts.id.renderButton(btnRef.current,{theme:"outline",size:"large",width:272});
    };
    tryInit();
    return ()=>{ cancelled=true; };
  },[]);

  return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:BG.page,fontFamily:"system-ui,-apple-system,'Segoe UI',sans-serif"}}>
    <div style={{background:"#fff",borderRadius:16,padding:"38px 34px",boxShadow:"0 4px 24px rgba(15,23,42,.08)",textAlign:"center",width:320,border:`1px solid ${INK.border}`}}>
      <div style={{fontSize:34,marginBottom:10}}>💰</div>
      <div style={{fontWeight:800,fontSize:17,color:INK.primary,marginBottom:6}}>가계부</div>
      <div style={{fontSize:12,color:INK.muted,marginBottom:22}}>등록된 Google 계정으로 로그인하세요</div>
      <div ref={btnRef} style={{display:"flex",justifyContent:"center"}}/>
      {busy&&<div style={{fontSize:12,color:INK.muted,marginTop:14}}>로그인 처리 중...</div>}
      {err&&<div style={{fontSize:12,color:STATUS.critical,marginTop:14}}>{err}</div>}
    </div>
  </div>);
}

// ══════════════════════════════════════════════════════════════════
// 메인 App
// ══════════════════════════════════════════════════════════════════

function App(){
  const [authed,setAuthed]=useState(()=>!!getSessionToken());
  const [loaded,setLoaded]=useState(false);
  const [cloudOk,setCloudOk]=useState(true);
  const [tab,setTab]=useState("dash");
  const [ym,setYm]=useState(currentYm());
  const [toastMsg,setToastMsg]=useState(null);

  const [members,setMembersRaw]=useState(DEF_MEMBERS);
  const [accounts,setAccountsRaw]=useState([]);
  const [categories,setCategoriesRaw]=useState(DEF_CATEGORIES);
  const [tx,setTxRaw]=useState([]);
  const [fixedTemplates,setFixedTemplatesRaw]=useState([]);
  const [budgets,setBudgetsRaw]=useState([]);
  const [allocAdjust,setAllocAdjustRaw]=useState({});
  const [config,setConfigRaw]=useState(DEF_CONFIG);

  const lastSyncRef=useRef({});
  const skipSaveRef=useRef(new Set());
  const debounceRef=useRef({});

  const toast=msg=>{setToastMsg(msg);setTimeout(()=>setToastMsg(null),3200);};

  // 세션 만료·거부 시 공통 처리 — 토큰을 지우고 로그인 화면으로 되돌린다
  const forceLogout=()=>{ setSessionToken(null); setAuthed(false); setLoaded(false); };

  useEffect(()=>{
    if(!authed) return;
    (async()=>{
      try{
        const d=await cloudGetAll();
        const load=(key,setter,def)=>{
          if(d[key]&&d[key].value){ try{ setter(JSON.parse(d[key].value)); }catch(e){ setter(def); } }
          lastSyncRef.current[key]=d[key]?.updatedAt||null;
          skipSaveRef.current.add(key);
        };
        load("ledger_members",setMembersRaw,DEF_MEMBERS);
        load("ledger_accounts",setAccountsRaw,[]);
        load("ledger_categories",setCategoriesRaw,DEF_CATEGORIES);
        load("ledger_tx",setTxRaw,[]);
        load("ledger_fixed_templates",setFixedTemplatesRaw,[]);
        load("ledger_budgets",setBudgetsRaw,[]);
        load("ledger_alloc_adjust",setAllocAdjustRaw,{});
        load("ledger_config",setConfigRaw,DEF_CONFIG);
        setCloudOk(true);
      }catch(e){
        console.error(e);
        if(String(e.message).includes("unauthorized")){ forceLogout(); return; }
        setCloudOk(false); toast("클라우드 연결 실패 — "+e.message);
      }
      setLoaded(true);
    })();
  },[authed]);

  // 저장 헬퍼 — 최초 로드 직후 1회는 저장 스킵(방금 받은 값 그대로 되돌려쓰기 방지)
  // 클라우드 저장은 700ms 디바운스 — 타이핑 중 매 글자마다 네트워크 요청을 쏘면 요청이 겹쳐 쌓이다가
  // 일부가 실패("failed to fetch")하는 문제가 있었음. 로컬 state는 즉시 반영(입력 반응성 유지),
  // 클라우드 저장만 타이핑이 멈춘 뒤 한 번에 보낸다.
  function makeSetter(key,raw,setRaw){
    return (next)=>{
      const val=typeof next==="function"?next(raw):next;
      setRaw(val);
      if(skipSaveRef.current.has(key)){ skipSaveRef.current.delete(key); return; }
      if(debounceRef.current[key]) clearTimeout(debounceRef.current[key]);
      debounceRef.current[key]=setTimeout(()=>{
        cloudSet(key,JSON.stringify(val)).then(r=>{lastSyncRef.current[key]=r.updatedAt;}).catch(e=>toast("저장 실패: "+e.message));
      },700);
    };
  }
  const setMembers=makeSetter("ledger_members",members,setMembersRaw);
  const setAccounts=makeSetter("ledger_accounts",accounts,setAccountsRaw);
  const setCategories=makeSetter("ledger_categories",categories,setCategoriesRaw);
  const setTx=makeSetter("ledger_tx",tx,setTxRaw);
  const setFixedTemplates=makeSetter("ledger_fixed_templates",fixedTemplates,setFixedTemplatesRaw);
  const setBudgets=makeSetter("ledger_budgets",budgets,setBudgetsRaw);
  const setAllocAdjust=makeSetter("ledger_alloc_adjust",allocAdjust,setAllocAdjustRaw);
  const setConfig=makeSetter("ledger_config",config,setConfigRaw);

  // "지금 생성 실행" 등 서버측 변경 직후 즉시 반영 — 30초 폴링을 기다리지 않고 ledger_tx·ledger_fixed_templates만 재조회
  const refreshTxAndFixed=async()=>{
    const d=await cloudGetAll();
    if(d.ledger_tx&&d.ledger_tx.value){ try{ setTxRaw(JSON.parse(d.ledger_tx.value)); lastSyncRef.current.ledger_tx=d.ledger_tx.updatedAt; skipSaveRef.current.add("ledger_tx"); }catch(e){} }
    if(d.ledger_fixed_templates&&d.ledger_fixed_templates.value){ try{ setFixedTemplatesRaw(JSON.parse(d.ledger_fixed_templates.value)); lastSyncRef.current.ledger_fixed_templates=d.ledger_fixed_templates.updatedAt; skipSaveRef.current.add("ledger_fixed_templates"); }catch(e){} }
  };

  // 30초 폴링 — 다른 기기의 변경사항 반영
  useEffect(()=>{
    if(!loaded) return;
    const iv=setInterval(async()=>{
      try{
        const d=await cloudGetAll();
        const maybe=(key,cur,setter)=>{
          const updatedAt=d[key]?.updatedAt;
          if(updatedAt&&updatedAt!==lastSyncRef.current[key]){
            try{ setter(JSON.parse(d[key].value)); lastSyncRef.current[key]=updatedAt; skipSaveRef.current.add(key); }catch(e){}
          }
        };
        maybe("ledger_members",members,setMembersRaw);
        maybe("ledger_accounts",accounts,setAccountsRaw);
        maybe("ledger_categories",categories,setCategoriesRaw);
        maybe("ledger_tx",tx,setTxRaw);
        maybe("ledger_fixed_templates",fixedTemplates,setFixedTemplatesRaw);
        maybe("ledger_budgets",budgets,setBudgetsRaw);
        maybe("ledger_alloc_adjust",allocAdjust,setAllocAdjustRaw);
        maybe("ledger_config",config,setConfigRaw);
        setCloudOk(true);
      }catch(e){
        if(String(e.message).includes("unauthorized")){ forceLogout(); return; }
        setCloudOk(false);
      }
    },SYNC_INTERVAL_MS);
    return ()=>clearInterval(iv);
  },[loaded,members,accounts,categories,tx,fixedTemplates,budgets,allocAdjust,config]);

  const doLogout=async()=>{ try{ await logoutReq(); }catch(e){} forceLogout(); };

  const data={tx,setTx,members,setMembers,accounts,setAccounts,categories,setCategories,budgets,setBudgets,fixedTemplates,setFixedTemplates,allocAdjust,setAllocAdjust,config,setConfig,toast,refreshTxAndFixed};

  const TABS=[["dash","📊 대시보드"],["cal","📅 캘린더"],["tx","📝 내역"],["alloc","🧮 월배분"],["settings","⚙ 설정"]];

  if(!authed) return <LoginScreen onLoggedIn={()=>setAuthed(true)}/>;
  if(!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:INK.muted,fontSize:13}}>불러오는 중...</div>;

  return(<div style={{display:"flex",flexDirection:"column",height:"100vh",fontFamily:"system-ui,-apple-system,'Segoe UI',sans-serif"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",background:"#fff",borderBottom:`1px solid ${INK.border}`,gap:10}}>
      <div style={{display:"flex",alignItems:"center",gap:14,minWidth:0,flex:"1 1 auto"}}>
        <span style={{fontWeight:800,fontSize:16,color:INK.primary,whiteSpace:"nowrap",flexShrink:0}}>💰 가계부</span>
        <div style={{display:"flex",gap:4,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {TABS.map(([k,l])=>(<button key={k} onClick={()=>setTab(k)}
            style={{padding:"7px 12px",borderRadius:9,border:"none",background:tab===k?PRIMARY:"transparent",color:tab===k?"#fff":INK.secondary,fontSize:12.5,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{l}</button>))}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <span style={{fontSize:11,color:cloudOk?INK.muted:STATUS.critical,display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:cloudOk?STATUS.good:STATUS.critical,display:"inline-block"}}/>
          {cloudOk?"동기화됨":"연결 끊김"}
        </span>
        <span onClick={doLogout} style={{fontSize:11,color:INK.muted,cursor:"pointer",whiteSpace:"nowrap"}}>로그아웃</span>
      </div>
    </div>

    {tab==="dash"&&<DashboardView data={data} ym={ym} setYm={setYm}/>}
    {tab==="cal"&&<CalendarView data={data}/>}
    {tab==="tx"&&<TxView data={data} ym={ym} setYm={setYm}/>}
    {tab==="alloc"&&<AllocView data={data} ym={ym} setYm={setYm}/>}
    {tab==="settings"&&<SettingsView data={data}/>}

    {toastMsg&&<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:INK.primary,color:"#fff",padding:"10px 18px",borderRadius:10,fontSize:12.5,boxShadow:"0 6px 20px rgba(0,0,0,.2)",zIndex:300}}>{toastMsg}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
